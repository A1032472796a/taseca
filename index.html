<script type="text/babel" data-presets="react,env">

var ROLES={admin:"Administrador",barbero:"Barbero",tatuador:"Tatuador/a",recepcionista:"Recepcionista"};
var RTABS={admin:["agenda","clientes","fidelidad","catalogo","caja","reportes","config"],barbero:["agenda","clientes","fidelidad","catalogo","reportes"],tatuador:["agenda","clientes","fidelidad","catalogo","reportes"],recepcionista:["agenda","clientes"]};

/* Slots 30min 8am-9pm */
var SLOTS=[];
for(var _h=8;_h<21;_h++){SLOTS.push((_h<10?"0":"")+_h+":00");SLOTS.push((_h<10?"0":"")+_h+":30");}

/* ─── HELPERS ───────────────────────────────────────────────────── */
function pt(t){var p=t.split(":");return parseInt(p[0])*60+parseInt(p[1]);}
function ts(d){return d.toISOString().slice(0,10);}
function today(){return ts(new Date());}
function vPhone(p){return (p||"").replace(/\D/g,"").length===10;}
function calDays(y,m){var days=[],f=new Date(y,m,1),l=new Date(y,m+1,0);for(var i=0;i<f.getDay();i++)days.push(null);for(var d=1;d<=l.getDate();d++)days.push(new Date(y,m,d));return days;}
function weekOf(base){var d=new Date(base),sun=new Date(d);sun.setDate(d.getDate()-d.getDay());return Array.from({length:7},function(_,i){var x=new Date(sun);x.setDate(sun.getDate()+i);return x;});}

/* ─── BASE STYLES ───────────────────────────────────────────────── */
var S={
  app:{background:"linear-gradient(160deg,#080c10,#0d1520)",minHeight:"100vh",maxWidth:430,margin:"0 auto",color:C.text},
  card:{background:C.card,borderRadius:14,padding:"13px 15px",marginBottom:10,border:"1px solid "+C.border},
  inp:{width:"100%",background:"#1a2230",border:"1px solid "+C.border,borderRadius:10,padding:"10px 12px",color:C.text,fontSize:14,boxSizing:"border-box",outline:"none"},

/* ─── LOGO ──────────────────────────────────────────────────────── */

}

/* ─── FIELD ─────────────────────────────────────────────────────── */
function Field(p){
  return (
    <div style={{marginBottom:10}}>
      <label style={S.lbl}>{p.label}</label>
      {p.opts
        ?<select style={S.inp} value={p.val||""} onChange={function(e){p.set(e.target.value);}}>
           <option value="">Seleccionar...</option>
           {p.opts.map(function(o){return <option key={o.v} value={o.v}>{o.l}</option>;})}
         </select>
        :<input style={S.inp} type={p.type||"text"} placeholder={p.ph||""} value={p.val||""}
           onChange={function(e){p.set(e.target.value);}}
           onKeyDown={function(e){if(e.key==="Enter")e.preventDefault();}}/>
      }
    </div>
  );
}

/* ─── MODAL ─────────────────────────────────────────────────────── */
function Mdl(p){
  return (
    <div style={S.ov} onClick={p.close}>
      <div style={S.mb} onClick={function(e){e.stopPropagation();}} onKeyDown={function(e){if(e.key==="Enter")e.stopPropagation();}}>
        <div style={{...S.row,marginBottom:14}}>
          <b style={{fontSize:15,color:C.accent}}>{p.title}</b>
          <button type="button" onClick={p.close} style={{background:"none",border:"none",color:C.muted,fontSize:22,cursor:"pointer"}}>✕</button>
        </div>
        {p.children}
        <div style={{display:"flex",gap:10,marginTop:8}}>
          <button type="button" style={{...S.btn("ghost"),flex:1}} onClick={p.close}>Cancelar</button>
          <button type="button" style={{...S.btn(),flex:2}} onClick={p.save}>{p.saveLabel||"Guardar"}</button>
        </div>
      </div>
    </div>
  );
}

/* ─── TOGGLE ────────────────────────────────────────────────────── */
function Toggle(p){
  return (
    <div onClick={p.onChange} style={{width:44,height:24,borderRadius:12,background:p.val?C.ok:C.border,cursor:"pointer",position:"relative",transition:"background .25s",flexShrink:0}}>
      <div style={{width:18,height:18,borderRadius:"50%",background:"#fff",position:"absolute",top:3,left:p.val?23:3,transition:"left .25s"}}/>
    </div>
  );
}

/* ─── PHONE INPUT ───────────────────────────────────────────────── */
function PhoneInput(p){
  var digs=(p.val||"").replace(/\D/g,"");
  var ok=digs.length===10;
  return (
    <div style={{marginBottom:10}}>
      <label style={S.lbl}>{p.label||"Telefono (10 digitos)"}</label>
      <div style={{position:"relative"}}>
        <input style={{...S.inp,borderColor:digs.length>0?(ok?C.ok:C.err):C.border}} type="tel"
          placeholder={p.ph||"0981000000"} value={p.val||""}
          onChange={function(e){p.set(e.target.value.replace(/\D/g,"").slice(0,10));}}
          onKeyDown={function(e){if(e.key==="Enter")e.preventDefault();}}/>
        {digs.length>0&&<span style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",fontSize:11,color:ok?C.ok:C.err,fontWeight:700}}>{digs.length}/10</span>}
      </div>
    </div>

}

/* ─── STAMP CARD ────────────────────────────────────────────────── */
function StampCard(p){
  var n=p.n||0,tot=10;
  return (
    <div style={{background:"#1a1a0a",border:"1.5px solid "+C.accent+"44",borderRadius:13,padding:"13px 14px"}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
        <b style={{color:C.accent,fontSize:13}}>Tarjeta de Fidelidad</b>
        <span style={{color:C.muted,fontSize:12}}>{n}/{tot}</span>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:5,marginBottom:10}}>
        {Array.from({length:tot},function(_,i){
          return <div key={i} style={{aspectRatio:"1",borderRadius:7,background:i<n?"linear-gradient(135deg,#c9a84c,#f0c040)":C.border,display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{i<n?"✂":""}</div>;
        })}
      </div>
      <div style={{background:n>=tot?"#2ecc7122":"#1a2230",borderRadius:8,padding:"6px 10px",textAlign:"center",fontSize:12}}>
        {n>=tot?<b style={{color:C.ok}}>Servicio gratis disponible! 🎉</b>:<span style={{color:C.muted}}>Faltan <b style={{color:C.accent}}>{tot-n}</b> sellos para tu servicio gratis</span>}
      </div>
    </div>
  );
}

/* ─── POINTS BAR ────────────────────────────────────────────────── */
function PtsBar(p){
  var pts=p.pts||0;
  var lvls=[{n:"Bronze",min:0,max:100,c:"#cd7f32"},{n:"Silver",min:100,max:300,c:"#aaa"},{n:"Gold",min:300,max:700,c:C.accent},{n:"Platinum",min:700,max:1500,c:C.cyan}];
  var cur=lvls[0];
  for(var i=0;i<lvls.length;i++){if(pts>=lvls[i].min&&(pts<lvls[i].max||i===lvls.length-1)){cur=lvls[i];break;}}
  var pct=Math.min(100,cur.max>cur.min?((pts-cur.min)/(cur.max-cur.min))*100:100);
  var nxt=lvls[lvls.indexOf(cur)+1];
  return (
    <div style={{background:"#161e2a",borderRadius:13,padding:"12px 13px",border:"1px solid "+cur.c+"44",marginTop:10}}>
      <div style={{display:"flex",justifyContent:"space-between",marginBottom:5}}>
        <b style={{color:cur.c,fontSize:12}}>⭐ {cur.n}</b>
        <b style={{color:C.accent,fontSize:13}}>{pts} pts</b>
      </div>
      <div style={{background:C.border,borderRadius:20,height:7,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:"linear-gradient(90deg,"+cur.c+","+C.accent+")",borderRadius:20}}/>
      </div>
      <div style={{display:"flex",justifyContent:"space-between",marginTop:3,fontSize:10,color:C.muted}}>
        <span>{cur.n}</span><span>{nxt?cur.max+" → "+nxt.n:"MAX"}</span>
      </div>
    </div>
  );
}

/* ─── WEEK CALENDAR ─────────────────────────────────────────────── */
function WeekCal(p){
  var appts=p.appts,users=p.users,stId=p.stId,onSlot=p.onSlot,onAppt=p.onAppt;
  var viewS=_useState("day");var view=viewS[0];var setView=viewS[1];
  var curS=_useState(new Date());var cur=curS[0];var setCur=curS[1];
  var staff=null;for(var i=0;i<users.length;i++){if(users[i].id===stId){staff=users[i];break;}}
  var hrs=[];for(var h=8;h<21;h++)hrs.push(h);

  /* Dates to show */
  var wk=view==="week"?weekOf(cur):[cur];
  var wStrs=wk.map(function(d){return ts(d);});
  var wa=appts.filter(function(a){return(!stId||a.stId===stId)&&wStrs.indexOf(a.date)>=0;});

  function isWork(date,hr,mn){
    if(!staff)return true;
    if(!staff.workDays||staff.workDays.indexOf(date.getDay())<0)return false;
    var t=hr*60+mn,s=pt(staff.wStart||"09:00"),e=pt(staff.wEnd||"19:00");
    return t>=s&&t<e;
  }
  function getAppt(ds,hr,mn){
    var slot=(hr<10?"0":"")+hr+":"+(mn===0?"00":"30");
    for(var i=0;i<wa.length;i++){if(wa[i].date===ds&&wa[i].time===slot)return wa[i];}
    return null;
  }

  /* Navigation */
  function prev(){var d=new Date(cur);d.setDate(d.getDate()-(view==="week"?7:1));setCur(d);}
  function next(){var d=new Date(cur);d.setDate(d.getDate()+(view==="week"?7:1));setCur(d);}
  function goToday(){setCur(new Date());}

  /* Day header label */
  function dayLabel(){
    if(view==="day"){
      var isT=ts(cur)===today();
      return <span style={{fontSize:13,fontWeight:700,color:isT?C.accent:C.text}}>
        {DY[cur.getDay()]} {cur.getDate()} de {MO[cur.getMonth()]} {cur.getFullYear()}
        {isT&&<span style={{background:C.accent,color:"#000",fontSize:9,fontWeight:900,padding:"1px 6px",borderRadius:10,marginLeft:6}}>HOY</span>}
      </span>;
    }
    var wkd=weekOf(cur);
    return <span style={{fontSize:12,fontWeight:700}}>{MS[wkd[0].getMonth()]} {wkd[0].getDate()} – {wkd[6].getDate()}, {wkd[0].getFullYear()}</span>;
  }

  /* Day appointments summary (for day view header) */
  var dayAppts=view==="day"?wa:[];
  var pendCount=dayAppts.filter(function(a){return a.status==="pendiente";}).length;
  var confCount=dayAppts.filter(function(a){return a.status==="confirmado";}).length;
  var walkCount=dayAppts.filter(function(a){return a.status==="walk_in";}).length;

  return (
    <div style={{background:C.bg,border:"1px solid "+C.border,borderRadius:12,overflow:"hidden"}}>

      {/* TOOLBAR */}
      <div style={{borderBottom:"1px solid "+C.border}}>
        {/* View toggle + nav */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 10px"}}>
          <div style={{display:"flex",gap:4}}>
            <button type="button" onClick={function(){setView("day");}} style={{padding:"4px 10px",borderRadius:8,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:view==="day"?C.accent:"#1a2230",color:view==="day"?"#000":C.muted}}>Dia</button>
            <button type="button" onClick={function(){setView("week");}} style={{padding:"4px 10px",borderRadius:8,border:"none",fontSize:11,fontWeight:700,cursor:"pointer",background:view==="week"?C.cyan:"#1a2230",color:view==="week"?"#000":C.muted}}>Semana</button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <button type="button" onClick={prev} style={{background:"none",border:"none",color:C.accent,fontSize:18,cursor:"pointer",padding:"2px 5px"}}>‹</button>
            {dayLabel()}
            <button type="button" onClick={next} style={{background:"none",border:"none",color:C.accent,fontSize:18,cursor:"pointer",padding:"2px 5px"}}>›</button>
          </div>
          <button type="button" onClick={goToday} style={{padding:"4px 9px",borderRadius:8,border:"1px solid "+C.border,background:"transparent",color:C.muted,fontSize:10,cursor:"pointer"}}>Hoy</button>
        </div>

        {/* Day view summary bar */}
        {view==="day"&&(pendCount+confCount+walkCount>0)&&(
          <div style={{display:"flex",gap:10,padding:"5px 12px 8px",fontSize:11}}>
            {confCount>0&&<span style={{color:C.cyan,fontWeight:700}}>✓ {confCount} confirmadas</span>}
            {pendCount>0&&<span style={{color:C.warn,fontWeight:700}}>⏳ {pendCount} pendientes</span>}
            {walkCount>0&&<span style={{color:"#8e44ad",fontWeight:700}}>⚡ {walkCount} walk-in</span>}
          </div>
        )}
        {view==="day"&&(pendCount+confCount+walkCount===0)&&(
          <div style={{padding:"4px 12px 8px",fontSize:11,color:C.muted}}>Sin citas para este dia</div>
        )}
      </div>

      {/* GRID */}
      <div style={{overflowY:"auto",maxHeight:"calc(100vh - 330px)"}}>
        <div style={{minWidth:view==="week"?340:200}}>

          {/* Column headers for week view */}
          {view==="week"&&(
            <div style={{display:"flex",borderBottom:"1px solid "+C.border,position:"sticky",top:0,background:C.bg,zIndex:5}}>
              <div style={{width:36,flexShrink:0}}/>
              {wk.map(function(d,i){
                var isT=ts(d)===today();
                var dAppts=appts.filter(function(a){return(!stId||a.stId===stId)&&a.date===ts(d);});
                return <div key={i} style={{flex:1,textAlign:"center",padding:"5px 1px",minWidth:44,cursor:"pointer"}} onClick={function(){setCur(d);setView("day");}}>
                  <div style={{fontSize:9,color:isT?C.accent:C.muted}}>{DY[d.getDay()]}</div>
                  <div style={{width:22,height:22,borderRadius:"50%",background:isT?C.accent:"transparent",color:isT?"#000":C.text,fontSize:11,display:"flex",alignItems:"center",justifyContent:"center",margin:"1px auto 0",fontWeight:isT?900:400}}>{d.getDate()}</div>
                  {dAppts.length>0&&<div style={{fontSize:8,color:isT?C.accent:C.muted,marginTop:1}}>{dAppts.length}c</div>}
                </div>;
              })}
            </div>
          )}

          {/* Time rows */}
          {hrs.map(function(hr){return [0,30].map(function(mn){
            var slotKey=hr+"-"+mn;
            return <div key={slotKey} style={{display:"flex",borderBottom:"1px solid "+C.border+"18",minHeight:view==="day"?44:28}}>
              <div style={{width:36,flexShrink:0,display:"flex",alignItems:"flex-start",justifyContent:"flex-end",paddingRight:4,paddingTop:2}}>
                {mn===0&&<span style={{fontSize:8,color:C.muted}}>{hr}:00</span>}
              </div>
              {wk.map(function(d,di){
                var ds=ts(d),a=getAppt(ds,hr,mn),iw=isWork(d,hr,mn);
                var bl=staff&&staff.blocks&&staff.blocks[ds];
                var ib=bl===true||(bl&&((bl.morning&&hr<13)||(bl.afternoon&&hr>=13)));
                var col=a?SC[a.status]||C.cyan:null;

  var rpS=_useState("");var rp=rpS[0];var setRp=rpS[1];
  var reS=_useState("");var re=reS[0];var setRe=reS[1];
  var rbS=_useState("");var rb=rbS[0];var setRb=rbS[1];
  var rerrS=_useState("");var rerr=rerrS[0];var setRerr=rerrS[1];
  var rdoneS=_useState(false);var rdone=rdoneS[0];var setRdone=rdoneS[1];

  var lpS=_useState("");var lp=lpS[0];var setLp=lpS[1];

  var staffL=users.filter(function(u){return u.role==="barbero"||u.role==="tatuador";});

  function slotOk(d,sl){
    if(!stf)return false;
    var ds=ts(d);if(ds<today())return false;
    if(!stf.workDays||stf.workDays.indexOf(d.getDay())<0)return false;
    var sm=pt(sl);if(sm<pt(stf.wStart||"09:00")||sm>=pt(stf.wEnd||"19:00"))return false;

            {[0,1,2,3].map(function(i){return <div key={i} style={{width:13,height:13,borderRadius:"50%",background:i<pin.length?C.accent:C.border}}/>;  })}

            <button type="button" onClick={function(){setSel(null);setPin("");setErr("");}} style={{background:"transparent",border:"none",fontSize:12,color:C.muted,cursor:"pointer",padding:"14px",textAlign:"center"}}>←</button>
            <button type="button" onClick={function(){tap("0");}} style={{background:C.card,border:"1px solid "+C.border,borderRadius:11,padding:"14px",fontSize:19,fontWeight:700,color:C.text,cursor:"pointer",textAlign:"center"}}>0</button>
            <button type="button" onClick={function(){setPin(function(p){return p.slice(0,-1);});}} style={{background:"transparent",border:"none",fontSize:17,color:C.muted,cursor:"pointer",padding:"14px",textAlign:"center"}}>⌫</button>
          </div>
        </div>}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════
   ADMIN PANEL

function Admin(p){
  var user=p.user,users=p.users,setUsers=p.setUsers;
  var svcs=p.svcs,setSvcs=p.setSvcs;
  var prods=p.prods,setProds=p.setProds;
  var clients=p.clients,setClients=p.setClients;
  var appts=p.appts,setAppts=p.setAppts;
  var sales=p.sales,setSales=p.setSales;
  var cfg=p.cfg,setCfg=p.setCfg;
  var onLogout=p.onLogout;
  if(!user)return null;

  var isAdmin=user.role==="admin";
  var stampsOn=cfg&&cfg.stampsOn;

  async function toggleStamps(){
    var upd=Object.assign({},cfg,{stampsOn:!stampsOn});
    await DB.save("config","cfg",upd);setCfg(upd);
  }

  var allTabs=[{id:"agenda",icon:"📅",label:"Agenda"},{id:"clientes",icon:"👥",label:"Clientes"},{id:"fidelidad",icon:"🎫",label:"Sellos"},{id:"catalogo",icon:"🛒",label:"Catalogo"},{id:"caja",icon:"💰",label:"Caja"},{id:"reportes",icon:"📊",label:"Reportes"},{id:"config",icon:"⚙️",label:"Config"}];
  var allowed=RTABS[user.role]||[];
  var tabs=allTabs.filter(function(t){return allowed.indexOf(t.id)>=0;});

  var tabS=_useState(tabs[0]?tabs[0].id:"agenda");var tab=tabS[0];var setTab=tabS[1];
  var subS=_useState("servicios");var sub=subS[0];var setSub=subS[1];
  var mdlS=_useState(null);var mdl=mdlS[0];var setMdl=mdlS[1];
  var schS=_useState(null);var schUser=schS[0];var setSchUser=schS[1];
  var adetS=_useState(null);var adet=adetS[0];var setAdet=adetS[1];
  var nslotS=_useState(null);var nslot=nslotS[0];var setNslot=nslotS[1];

  var staffL=users.filter(function(u){return u.role==="barbero"||u.role==="tatuador";});
  var initSt=isAdmin?(staffL[0]?staffL[0].id:null):user.id;
  var stS=_useState(initSt);var selSt=stS[0];var setSelSt=stS[1];
  var notifS=_useState([]);var notifs=notifS[0];var setNotifs=notifS[1];
  var showNS=_useState(false);var showN=showNS[0];var setShowN=showNS[1];

  _useEffect(function(){
    if(user.role!=="admin"&&user.role!=="recepcionista")return;
    var lastCheck=localStorage.getItem("taseca_lnc")||"0";
    async function checkN(){
      try{
        var all=await DB.all("notifs");
        var mine=all.filter(function(n){return n.forRoles&&n.forRoles.indexOf(user.role)>=0&&!n.read&&n.id>lastCheck;});
        if(mine.length>0){
          setNotifs(mine);setShowN(true);
          localStorage.setItem("taseca_lnc",mine[mine.length-1].id);
          mine.forEach(function(n){pushNotif("Taseca",n.msg);});
        }
      }catch(e){}
    }
    checkN();
    var iv=setInterval(checkN,15000);
    return function(){clearInterval(iv);};
  },[]);

  var totalV=sales.reduce(function(a,s){return a+s.total;},0);
  var fab={position:"fixed",bottom:86,right:14,background:C.accent,color:"#000",border:"none",borderRadius:"50%",width:46,height:46,fontSize:21,cursor:"pointer",fontWeight:900,boxShadow:"0 4px 14px #c9a84c55",zIndex:99};

  function closeM(){setMdl(null);}

  /* ─── Service Modal ─── */
  function SvcMdl(){
    var d=mdl&&mdl.d||{};
    var nS=_useState(d.name||"");var n=nS[0];var setN=nS[1];
    var pS=_useState(d.price||"");var pr=pS[0];var setPr=pS[1];
    var duS=_useState(d.dur||30);var du=duS[0];var setDu=duS[1];
    var cS=_useState(d.cat||"barberia");var cat=cS[0];var setCat=cS[1];
    async function save(){
      if(!n||!pr)return;
      var item={id:d.id||"s"+Date.now(),name:n,price:Number(pr),dur:Number(du),cat:cat};
      d.id?setSvcs(function(x){return x.map(function(s){return s.id===d.id?item:s;});}):setSvcs(function(x){return x.concat([item]);});
      closeM();
      try{await DB.save("services",item.id,item);}catch(e){console.error(e);}
    }
    return <Mdl title={d.id?"Editar Servicio":"Nuevo Servicio"} close={closeM} save={save}>
      <Field label="Nombre" val={n} set={setN} ph="Corte clasico"/>
      <Field label="Precio ($)" val={pr} set={setPr} type="number" ph="15"/>
      <Field label="Duracion (min)" val={du} set={setDu} type="number" ph="30"/>
      <Field label="Categoria" val={cat} set={setCat} opts={[{v:"barberia",l:"Barberia"},{v:"tatuaje",l:"Tatuaje"}]}/>
    </Mdl>;
  }

  /* ─── Product Modal ─── */
  function ProdMdl(){
    var d=mdl&&mdl.d||{};
    var nS=_useState(d.name||"");var n=nS[0];var setN=nS[1];
    var pS=_useState(d.price||"");var pr=pS[0];var setPr=pS[1];
    var stS=_useState(d.stock||0);var st=stS[0];var setSt=stS[1];
    async function save(){
      if(!n||!pr)return;
      var item={id:d.id||"p"+Date.now(),name:n,price:Number(pr),stock:Number(st)};
      d.id?setProds(function(x){return x.map(function(s){return s.id===d.id?item:s;});}):setProds(function(x){return x.concat([item]);});
      closeM();
      try{await DB.save("products",item.id,item);}catch(e){console.error(e);}
    }
    return <Mdl title={d.id?"Editar Producto":"Nuevo Producto"} close={closeM} save={save}>
      <Field label="Nombre" val={n} set={setN} ph="Pomada fijadora"/>
      <Field label="Precio ($)" val={pr} set={setPr} type="number" ph="10"/>
      <Field label="Stock" val={st} set={setSt} type="number" ph="20"/>
    </Mdl>;
  }

  /* ─── Client Modal ─── */
  function CliMdl(){
    var d=mdl&&mdl.d||{};
    var nS=_useState(d.name||"");var n=nS[0];var setN=nS[1];
    var phS=_useState(d.phone||"");var ph=phS[0];var setPh=phS[1];
    var eS=_useState("");var ce=eS[0];var setCe=eS[1];
    async function save(){
      setCe("");
      if(!n){setCe("Nombre obligatorio");return;}
      if(ph&&!vPhone(ph)){setCe("Telefono debe tener 10 digitos");return;}
      var item={id:d.id||"c"+Date.now(),name:n,phone:ph,visits:d.visits||0,last:d.last||"-",stamps:d.stamps||0,pts:d.pts||0,since:d.since||today()};
      d.id?setClients(function(x){return x.map(function(s){return s.id===d.id?item:s;});}):setClients(function(x){return x.concat([item]);});
      closeM();
      try{await DB.save("clients",item.id,item);}catch(e){console.error(e);}
    }
    return <Mdl title={d.id?"Editar Cliente":"Nuevo Cliente"} close={closeM} save={save}>
      <Field label="Nombre completo" val={n} set={setN} ph="Carlos Mendez"/>
      <PhoneInput val={ph} set={setPh}/>
      {ce&&<div style={{color:C.err,fontSize:12,marginBottom:8}}>⚠️ {ce}</div>}
    </Mdl>;
  }

  /* ─── Appt Modal ─── */
  function ApptMdl(){
    var d=mdl&&mdl.d||nslot||{};
    var wiS=_useState(!d.id&&!d.date);var wi=wiS[0];var setWi=wiS[1];
    var cnS=_useState(d.client||"");var cn=cnS[0];var setCn=cnS[1];
    var svS=_useState(d.svc||"");var sv=svS[0];var setSv=svS[1];
    var dtS=_useState(d.date||"");var dt=dtS[0];var setDt=dtS[1];
    var tmS=_useState(d.time||"");var tm=tmS[0];var setTm=tmS[1];
    var stS=_useState(d.status||"pendiente");var st=stS[0];var setSt=stS[1];
    var sfS=_useState(d.stId||selSt||"");var sf=sfS[0];var setSf=sfS[1];
    var aeS=_useState("");var ae=aeS[0];var setAe=aeS[1];
    var loadS=_useState(false);var load=loadS[0];var setLoad=loadS[1];
    async function save(){
      setAe("");
      if(!cn){setAe("El nombre del cliente es obligatorio");return;}
      if(!sv){setAe("Selecciona un servicio");return;}
      if(!wi&&!dt){setAe("Selecciona una fecha");return;}
      if(!wi&&!tm){setAe("Selecciona una hora");return;}
      if(!sf){setAe("Selecciona un profesional");return;}
      setLoad(true);
      try{
        var now2=new Date();
        var svcObj=null;for(var i=0;i<svcs.length;i++){if(svcs[i].name===sv){svcObj=svcs[i];break;}}
        var item={id:d.id||"a"+Date.now(),client:cn,svc:sv,svcId:svcObj?svcObj.id:"",stId:sf,date:wi?today():dt,time:wi?(now2.getHours()<10?"0":"")+now2.getHours()+":"+(now2.getMinutes()<30?"00":"30"):tm,status:wi?"walk_in":st,dur:svcObj?svcObj.dur:30};
        d.id?setAppts(function(x){return x.map(function(a){return a.id===d.id?item:a;});}):setAppts(function(x){return x.concat([item]);});
        pushNotif("Taseca — Nueva cita",cn+" · "+sv+" · "+(wi?"Ahora":dt+" "+tm));
        setMdl(null);setNslot(null);
        try{await DB.save("appointments",item.id,item);}catch(e){console.error(e);}
        /* Programar recordatorio email si tiene email */
        if(item.status==="confirmado"){
          var cliD=null;for(var k=0;k<clients.length;k++){if(clients[k].name===item.client||clients[k].phone===item.phone){cliD=clients[k];break;}}
          var stfN="";for(var m=0;m<users.length;m++){if(users[m].id===item.stId){stfN=users[m].name;break;}}
          scheduleReminder(item,cliD,stfN);
        }
      }catch(e){
        setAe("Error al guardar: "+e.message+". Revisa tu conexion a internet.");
      }
      setLoad(false);
    }
    return <Mdl title={wi?"⚡ Cliente sin cita":"Cita"} close={function(){setMdl(null);setNslot(null);}} save={save}>
      <div style={{display:"flex",gap:8,marginBottom:11}}>
        <button type="button" onClick={function(){setWi(false);}} style={{...S.btn(wi?"ghost":"gold"),flex:1,fontSize:12}}>📅 Con cita</button>
        <button type="button" onClick={function(){setWi(true);}} style={{...S.btn(wi?"cyan":"ghost"),flex:1,fontSize:12,color:wi?"#000":C.muted}}>⚡ Walk-in</button>
      </div>
      <Field label="Cliente" val={cn} set={setCn} ph="Nombre"/>
      <Field label="Servicio" val={sv} set={setSv} opts={svcs.map(function(s){return{v:s.name,l:s.name+" — $"+s.price};})}/>
      <Field label="Profesional" val={sf} set={setSf} opts={staffL.map(function(u){return{v:u.id,l:u.name};})}/>
      {!wi&&<>
        <Field label="Fecha" val={dt} set={setDt} type="date"/>
        <Field label="Hora" val={tm} set={setTm} opts={SLOTS.map(function(s){return{v:s,l:s};})}/>
        <Field label="Estado" val={st} set={setSt} opts={[{v:"pendiente",l:"Pendiente"},{v:"confirmado",l:"Confirmado"}]}/>
      </>}
      {wi&&<div style={{background:"#8e44ad22",border:"1px solid #8e44ad44",borderRadius:9,padding:"8px 11px",fontSize:11,color:"#c39bd3"}}>⚡ Se registrara con hora actual</div>}
      {ae&&<div style={{background:C.err+"22",border:"1px solid "+C.err+"55",borderRadius:9,padding:"9px 12px",fontSize:12,color:C.err,marginTop:8}}>⚠️ {ae}</div>}
      {load&&<div style={{textAlign:"center",fontSize:12,color:C.muted,marginTop:8}}>⏳ Guardando...</div>}
    </Mdl>;
  }

  /* ─── Sale Modal ─── */
  function SaleMdl(){
    var clS=_useState("");var cl=clS[0];var setCl=clS[1];
    var itS=_useState("");var it=itS[0];var setIt=itS[1];
    var toS=_useState("");var to=toS[0];var setTo=toS[1];
    var mtS=_useState("efectivo");var mt=mtS[0];var setMt=mtS[1];
    async function save(){
      if(!cl||!to)return;
      var item={id:"v"+Date.now(),client:cl,items:it.split(",").map(function(x){return x.trim();}),total:Number(to),method:mt,date:today(),auto:false};
      setSales(function(x){return x.concat([item]);});closeM();

      <Field label="Cliente" val={cl} set={setCl} ph="Nombre"/>

      <Field label="Total ($)" val={to} set={setTo} type="number" ph="25"/>
      <Field label="Metodo" val={mt} set={setMt} opts={[{v:"efectivo",l:"Efectivo"},{v:"tarjeta",l:"Tarjeta"},{v:"transferencia",l:"Transferencia"}]}/>

  /* ─── User Modal ─── */
  function UserMdl(){
    var d=mdl&&mdl.d||{};
    var nS=_useState(d.name||"");var n=nS[0];var setN=nS[1];
    var rS=_useState(d.role||"barbero");var r=rS[0];var setR=rS[1];
    var eS=_useState(d.email||"");var e=eS[0];var setE=eS[1];
    var piS=_useState(d.pin||"");var pi=piS[0];var setPi=piS[1];
    async function save(){
      if(!n)return;
      var item=Object.assign({},d.id?d:{id:"u"+Date.now(),photo:null,workDays:[1,2,3,4,5],wStart:"09:00",wEnd:"19:00",blocks:{}},{name:n,role:r,email:e,pin:pi});
      d.id?setUsers(function(x){return x.map(function(u){return u.id===d.id?item:u;});}):setUsers(function(x){return x.concat([item]);});
      closeM();
      try{await DB.save("users",item.id,item);}catch(e){console.error(e);}
    }
    return <Mdl title={d.id?"Editar Usuario":"Nuevo Usuario"} close={closeM} save={save}>
      <Field label="Nombre" val={n} set={setN} ph="Juan Barbero"/>

      <Field label="Email" val={e} set={setE} ph="usuario@shop.com"/>

  /* ─── Photo Btn ─── */
  function PhotoBtn(pp){
    var u=pp.u,ref=_useRef();
    return <span>
      <input type="file" accept="image/*" ref={ref} style={{display:"none"}} onChange={function(e){
        if(!e.target.files[0])return;
        var fr=new FileReader();
        fr.onload=async function(ev){var upd=Object.assign({},u,{photo:ev.target.result});await DB.save("users",u.id,upd);setUsers(function(x){return x.map(function(uu){return uu.id===u.id?upd:uu;});});};
        fr.readAsDataURL(e.target.files[0]);
      }}/>
      <button type="button" style={{...S.btn("ghost"),width:"auto",padding:"4px 9px",fontSize:11}} onClick={function(){ref.current.click();}}>📷</button>
    </span>;
  }

  /* ─── Confirm appt ─── */
  async function confirmAppt(a){
    /* 1. Actualizar UI inmediatamente */
    var upd=Object.assign({},a,{status:"confirmado"});
    setAppts(function(x){return x.map(function(aa){return aa.id===upd.id?upd:aa;});});
    setAdet(null);

    /* 2. Notificar a admins y recepcionistas en el dispositivo actual */
    var confirmedBy=user.name;
    pushNotif("✅ Cita confirmada por "+confirmedBy, a.client+" · "+a.svc+" · "+a.date+" "+a.time);

    /* 3. Guardar notificacion en Firebase para otros usuarios */
    var notif={
      id:"n"+Date.now(),
      type:"confirm",
      msg:"✅ "+confirmedBy+" confirmó la cita de "+a.client+" ("+a.svc+" · "+a.time+")",
      date:today(),
      time:new Date().toLocaleTimeString("es",{hour:"2-digit",minute:"2-digit"}),
      forRoles:["admin","recepcionista"],
      read:false,
      apptId:a.id
    };

    /* 4. Guardar en Firebase en background */
    try{
      await DB.save("appointments",upd.id,upd);
      try{await DB.save("notifs",notif.id,notif);}catch(e){}
      /* sello auto */
      if(stampsOn){
        var mc=null;for(var i=0;i<clients.length;i++){if(clients[i].name===a.client||clients[i].phone===a.phone){mc=clients[i];break;}}
        if(mc){var ns=Math.min((mc.stamps||0)+1,10),mcu=Object.assign({},mc,{stamps:ns,pts:(mc.pts||0)+10,visits:(mc.visits||0)+1,last:today()});try{await DB.save("clients",mc.id,mcu);}catch(e){}setClients(function(x){return x.map(function(cc){return cc.id===mc.id?mcu:cc;});});}
      }
      /* venta auto */
      var svcObj=null;for(var j=0;j<svcs.length;j++){if(svcs[j].name===a.svc){svcObj=svcs[j];break;}}
      var sale={id:"v"+Date.now(),client:a.client,items:[a.svc],total:svcObj?svcObj.price:0,method:"pendiente",date:a.date,auto:true};
      try{await DB.save("sales",sale.id,sale);}catch(e){}
      setSales(function(x){return x.concat([sale]);});
    }catch(e){console.error("confirmAppt error:",e);}
  }

  /* ─── Clients visible to this user ─── */
  var visClients=isAdmin?clients:clients.filter(function(cl){return appts.some(function(a){return a.stId===user.id&&(a.client===cl.name||a.phone===cl.phone);});});
  var visAppts=isAdmin?appts:appts.filter(function(a){return a.stId===user.id;});
  var visSales=isAdmin?sales:sales.filter(function(s){return visAppts.some(function(a){return a.client===s.client;});});

  return (
    <div style={{...S.app,paddingBottom:80}}>
      {/* HEADER */}
      <div style={{background:"linear-gradient(135deg,#0d1520,#080c10)",padding:"11px 13px 10px",borderBottom:"1px solid "+C.border}}>
        <div style={S.row}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <Logo size={24}/>
            <div>
              <div style={{fontSize:14,fontWeight:900,background:"linear-gradient(90deg,#c9a84c,#4ecdc4)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>TASECA</div>
              <div style={{fontSize:9,color:C.muted}}>Hola <b style={{color:C.accent}}>{user.name}</b> · {ROLES[user.role]}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:7,alignItems:"center"}}>
            {(user.role==="admin"||user.role==="recepcionista")&&notifs.length>0&&(
              <div style={{position:"relative"}}>
                <button type="button" onClick={function(){setShowN(function(v){return !v;});}} style={{background:"none",border:"1px solid "+C.warn+"55",borderRadius:9,padding:"5px 9px",color:C.warn,fontSize:14,cursor:"pointer"}}>
                  🔔
                  <span style={{position:"absolute",top:-4,right:-4,background:C.err,color:"#fff",fontSize:8,fontWeight:900,width:14,height:14,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center"}}>{notifs.length}</span>
                </button>
              </div>
            )}
            <button type="button" onClick={function(){setNslot({stId:selSt});}} style={{...S.btn("cyan"),padding:"5px 10px",fontSize:11,color:"#000"}}>⚡ Walk-in</button>
            <button type="button" onClick={onLogout} style={{background:C.border,border:"none",borderRadius:9,padding:"5px 9px",color:C.muted,fontSize:11,cursor:"pointer"}}>Salir</button>
          </div>
        </div>
      </div>

      {/* PANEL DE NOTIFICACIONES */}
      {showN&&notifs.length>0&&(
        <div style={{background:"#1a1a0a",border:"1px solid "+C.warn+"55",margin:"8px 11px",borderRadius:12,padding:"12px 14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:9}}>
            <b style={{color:C.warn,fontSize:13}}>🔔 Notificaciones ({notifs.length})</b>
            <button type="button" onClick={async function(){
              setShowN(false);
              var marked=notifs.map(function(n){return Object.assign({},n,{read:true});});
              setNotifs([]);
              marked.forEach(async function(n){try{await DB.save("notifs",n.id,n);}catch(e){};});

/* ═══════════════════════════════════════════════════════════════
   NOTIFICACIONES PUSH
═══════════════════════════════════════════════════════════════ */
function NotifBanner(p){
  var permS=_useState(Notification&&Notification.permission||"default");
  var perm=permS[0];var setPerm=permS[1];
  var visS=_useState(perm==="default");var vis=visS[0];var setVis=visS[1];

  if(!vis||!window.Notification)return null;
  if(perm==="granted"||perm==="denied")return null;

  async function request(){
    var r=await Notification.requestPermission();
    setPerm(r);setVis(false);
    if(r==="granted"){
      new Notification("Taseca activado",{body:"Recibiras notificaciones de nuevas citas",icon:"/favicon.ico"});
    }
  }

  return (
    <div style={{background:"linear-gradient(135deg,#1a2230,#111820)",border:"1px solid "+C.accent+"44",borderRadius:13,padding:"13px 15px",marginBottom:11,display:"flex",alignItems:"center",gap:11}}>
      <div style={{fontSize:28,flexShrink:0}}>🔔</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:2}}>Activar notificaciones</div>
        <div style={{color:C.muted,fontSize:11}}>Recibe alertas cuando lleguen nuevas citas</div>
      </div>
      <div style={{display:"flex",gap:7,flexShrink:0}}>
        <button type="button" onClick={function(){setVis(false);}} style={{...S.btn("ghost"),padding:"5px 9px",fontSize:11}}>No</button>
        <button type="button" onClick={request} style={{...S.btn("cyan"),padding:"5px 9px",fontSize:11,color:"#000"}}>Activar</button>
      </div>
    </div>
  );
}

/* helper para enviar notificacion desde cualquier parte */
function pushNotif(title,body){
  if(window.Notification&&Notification.permission==="granted"){
    try{new Notification(title,{body:body,icon:"/favicon.ico",badge:"/favicon.ico"});}catch(e){}
  }
}

/* ─── EMAIL RECORDATORIO ────────────────────────────────────────── */
async function sendReminder(appt, clientData, staffName){
  if(!clientData||!clientData.email) return; // sin email no enviamos
  if(!window.emailjs) return;
  try{
    emailjs.init(window.EMAILJS_KEY);
    await emailjs.send(window.EMAILJS_SVC, window.EMAILJS_TPL, {
      to_email:   clientData.email,
      client_name:clientData.name||appt.client,
      service:    appt.svc,
      staff:      staffName||"Tu profesional",
      date:       appt.date,
      time:       appt.time
    });
    console.log("✅ Recordatorio enviado a",clientData.email);
  }catch(e){
    console.error("EmailJS error:",e);
  }
}

/* Programar recordatorio 1 hora antes */
function scheduleReminder(appt, clientData, staffName){
  if(!clientData||!clientData.email) return;
  var apptTime=new Date(appt.date+"T"+appt.time+":00");
  var reminderTime=new Date(apptTime.getTime()-60*60*1000); // 1 hora antes
  var now=new Date();
  var diff=reminderTime-now;
  if(diff>0&&diff<24*60*60*1000){ // Solo si es dentro de las próximas 24h
    console.log("📧 Recordatorio programado para",reminderTime.toLocaleTimeString());
    setTimeout(function(){
      sendReminder(appt,clientData,staffName);
    },diff);
  }
}

  var scrS=_useState("loading");var scr=scrS[0];var setScr=scrS[1];
  var userS=_useState(null);var user=userS[0];var setUser=userS[1];
  var usersS=_useState([]);var users=usersS[0];var setUsers=usersS[1];
  var svcsS=_useState([]);var svcs=svcsS[0];var setSvcs=svcsS[1];
  var prodsS=_useState([]);var prods=prodsS[0];var setProds=prodsS[1];
  var cliS=_useState([]);var clients=cliS[0];var setClients=cliS[1];
  var aptS=_useState([]);var appts=aptS[0];var setAppts=aptS[1];
  var salS=_useState([]);var sales=salS[0];var setSales=salS[1];
  var cfgS=_useState(DEF_CFG);var cfg=cfgS[0];var setCfg=cfgS[1];

  var init=_useCallback(async function(){
    try{
      var u=await DB.all("users");if(u.length===0){for(var i=0;i<DEF_USERS.length;i++)await DB.save("users",DEF_USERS[i].id,DEF_USERS[i]);u=DEF_USERS;}
      setUsers(u);
      var sv=await DB.all("services");if(sv.length===0){for(var j=0;j<DEF_SVC.length;j++)await DB.save("services",DEF_SVC[j].id,DEF_SVC[j]);sv=DEF_SVC;}
      setSvcs(sv);
      setProds(await DB.all("products"));
      setClients(await DB.all("clients"));
      setAppts(await DB.all("appointments"));
      setSales(await DB.all("sales"));
      var cfArr=await DB.all("config");if(cfArr.length>0)setCfg(cfArr[0]);else await DB.save("config","cfg",DEF_CFG);
      setScr("public");
    }catch(e){console.error(e);setScr("public");}
  },[]);

  _useEffect(function(){
    if(window._fb)init();
    else window.addEventListener("fbReady",init,{once:true});
    return function(){window.removeEventListener("fbReady",init);};
  },[init]);

  if(scr==="loading")return(
    <div style={{...S.app,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",minHeight:"100vh"}}>
      <Logo size={68}/>
      <div style={{color:C.accent,fontSize:17,fontWeight:900,marginTop:14,letterSpacing:4}}>TASECA</div>
      <div style={{color:C.muted,fontSize:11,marginTop:7}}>Conectando...</div>
    </div>
  );

  if(scr==="login")return <Login users={users} onLogin={function(u){setUser(u);setScr("admin");}} onBack={function(){setScr("public");}}/>;
  if(scr==="admin")return <Admin user={user} users={users} setUsers={setUsers} svcs={svcs} setSvcs={setSvcs} prods={prods} setProds={setProds} clients={clients} setClients={setClients} appts={appts} setAppts={setAppts} sales={sales} setSales={setSales} cfg={cfg} setCfg={setCfg} onLogout={function(){setUser(null);setScr("public");}}/>;
  return <Public svcs={svcs} appts={appts} users={users} clients={clients} cfg={cfg} onBook={function(a){setAppts(function(x){return x.concat([a]);});}} onAdmin={function(){setScr("login");}} onReg={function(c){setClients(function(x){return x.concat([c]);});}}/>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
